<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>GitHub Profile Finder</h1>

    <div class="search-box">
      <input
        type="text"
        id="usernameInput"
        placeholder="Enter GitHub username..."
      />
      <button id="searchBtn">Search</button>
    </div>

    <p id="error">User not found!</p>

    <div class="profile-card" id="profileCard">
      <div class="profile-header">
        <img id="avatar" src="" alt="Avatar" />
        <div>
          <p class="profile-name" id="name"></p>
          <p style="color: #8b949e" id="username"></p>
        </div>
      </div>
      <p class="profile-bio" id="bio"></p>
      <div class="profile-stats">
        <div class="stat">
          <p class="stat-number" id="followers"></p>
          <p class="stat-label">Followers</p>
        </div>
        <div class="stat">
          <p class="stat-number" id="following"></p>
          <p class="stat-label">Following</p>
        </div>
        <div class="stat">
          <p class="stat-number" id="repos"></p>
          <p class="stat-label">Repos</p>
        </div>
      </div>
      <a class="profile-link" id="profileLink" target="_blank"
        >View on GitHub</a
      >
    </div>

    <script src="github.js"></script>
  </body>
</html>
